<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BH Eats</title>
    <link rel="stylesheet" href="assets/css/style.css"></link>
    <script defer src="assets/scripts/login.js"></script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html">BH Eats</a>
            </div>
            <ul class="menu">
                <li><a href="index.html#inicio">Início</a></li>
                <li><a href="index.html#destaque">Destaque</a></li>
                <li><a href="index.html#categorias">Categorias</a></li>
                <li><a href="index.html#top5">Top 5</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="login-page">
            <a href="index.html" class="voltar-link">← Voltar à página inicial</a>
            <div class="login-container">
                <h1>Login</h1>
                <form id="login-form">
                    <label for="login">Usuário:</label>
                    <input type="text" id="login" name="login" required>

                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" required>

                    <button type="submit">Entrar</button>
                </form>
                <a href="cadastro.html" id="cadastro-link">Cadastre-se</a>
                <p id="login-message" class="login-message"></p>
            </div>
        </section>
    </main>

    <footer>
        <p>Arthur de Carvalho Costa &nbsp;|&nbsp; Engenharia de Software &nbsp;|&nbsp; Manhã</p>
    </footer>
</body>
</html>
